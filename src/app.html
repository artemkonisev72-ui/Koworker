<!doctype html>
<html lang="ru">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
		<meta name="theme-color" content="#f9f8f6" />
		<meta
			name="description"
			content="AI-ассистент для решения задач по термеху, сопромату и матанализу с точными вычислениями через Python."
		/>
		<link rel="icon" href="/favicon.svg" type="image/svg+xml" />
		<link rel="icon" href="/favicon.ico" sizes="any" />
		<link rel="apple-touch-icon" href="/apple-touch-icon.png" />
		<link rel="manifest" href="/manifest.json" />
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous" />
		<link
			href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Playfair+Display:wght@400;500;600;700&display=swap"
			rel="stylesheet"
		/>
		<script>
			(() => {
				const STORAGE_KEY = 'coworker-theme';
				try {
					const saved = window.localStorage.getItem(STORAGE_KEY);
					const theme = saved === 'dark' ? 'dark' : 'light';
					document.documentElement.dataset.theme = theme;
					document.documentElement.style.colorScheme = theme;
					const themeMeta = document.querySelector('meta[name="theme-color"]');
					if (themeMeta) {
						themeMeta.setAttribute('content', theme === 'dark' ? '#1c1a19' : '#f9f8f6');
					}
				} catch {
					document.documentElement.dataset.theme = 'light';
					document.documentElement.style.colorScheme = 'light';
				}
			})();
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
